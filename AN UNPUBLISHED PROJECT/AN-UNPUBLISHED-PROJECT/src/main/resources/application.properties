spring.application.name=AN-UNPUBLISHED-PROJECT

server.port =9074


razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

spring.config.import=optional:configserver:http://localhost:8888

spring.datasource.url=jdbc:mysql://localhost:3306/user_db
spring.datasource.username=${username}
spring.datasource.password=${password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ==========================
# Kafka Bootstrap Servers
# ==========================
spring.kafka.bootstrap-servers[0]=kafka-broker-1.prod.localhost:9092

# ==========================
# Common Properties
# ==========================
spring.kafka.properties.schema.registry.url=https://schema-registry.prod.yourdomain.com:8081

spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";

# ==========================
# Kafka Admin
# ==========================
spring.kafka.admin.properties.retention.ms=259200000
spring.kafka.admin.properties.retention.bytes=1073741824
spring.kafka.admin.properties.log.cleanup.policy=delete

# ==========================
# Producer
# ==========================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

spring.kafka.producer.compression-type=snappy
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432

spring.kafka.producer.properties.enable.idempotence=true

# ==========================
# Consumer
# ==========================
spring.kafka.consumer.group-id=dating-app-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer

spring.kafka.consumer.properties.specific.avro.reader=true

# ==========================
# Listener
# ==========================
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=3

spring.docker.compose.enabled=false
